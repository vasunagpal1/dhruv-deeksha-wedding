<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder portrait two</title>
  <desc id="desc">Royal gradient placeholder prompting the user to upload Dhruv and Deeksha portrait two.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#6b80b9" />
      <stop offset="50%" stop-color="#90a7d8" />
      <stop offset="100%" stop-color="#d3aa64" />
    </linearGradient>
    <radialGradient id="glow" cx="74%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="1800" rx="120" fill="url(#bg)" />
  <rect x="42" y="42" width="1116" height="1716" rx="88" fill="none" stroke="rgba(255,255,255,0.34)" />
  <rect width="1200" height="1800" rx="120" fill="url(#glow)" />
  <text x="110" y="260" fill="#f7efe2" font-family="Cinzel, serif" font-size="44" letter-spacing="18">SECOND PORTRAIT</text>
  <text x="110" y="400" fill="#fff7ee" font-family="Cormorant Garamond, serif" font-size="118" font-weight="700">Load Photo Two</text>
  <text x="110" y="520" fill="#fff7ee" font-family="Cormorant Garamond, serif" font-size="108" font-weight="700">for the Shared</text>
  <text x="110" y="630" fill="#fff7ee" font-family="Cormorant Garamond, serif" font-size="108" font-weight="700">Glance</text>
  <text x="110" y="790" fill="#f7efe2" font-family="Manrope, sans-serif" font-size="48">Use the photo studio panel or replace</text>
  <text x="110" y="860" fill="#f7efe2" font-family="Manrope, sans-serif" font-size="48">assets/dhruv-deeksha-2.jpg before deploy.</text>
  <rect x="110" y="1430" width="980" height="170" rx="85" fill="rgba(12,8,14,0.38)" />
  <text x="180" y="1528" fill="#fff7ee" font-family="Cinzel, serif" font-size="36" letter-spacing="10">THE SHARED GLANCE LANDS HERE</text>
